site_name: Biosiglib
site_description: Language-independent specifications and conformance resources for reproducible biomedical signal processing.
repo_url: https://github.com/BSICoS/biosiglib
repo_name: BSICoS/biosiglib

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search

nav:
  - Home: index.md
  - Ecosystem: ecosystem.md
  - Specifications:
      - Overview: specifications.md
      - hrv.tdmetrics: generated/specifications/hrv.tdmetrics.md
      - ecg.pantompkins: generated/specifications/ecg.pantompkins.md
      - ecg.sloperange: generated/specifications/ecg.sloperange.md
  - Scientific Notes:
      - Overview: scientific/index.md
      - ecg.sloperange: scientific/ecg.sloperange.md
      - Template: scientific/template.md
  - Conformance: conformance.md
  - Releases: releases.md
  - Citation: citation.md
  - Development: development.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
