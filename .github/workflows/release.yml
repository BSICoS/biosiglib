name: Release Biosiglib

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release request
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            echo "Release workflow must run from the default branch: $DEFAULT_BRANCH" >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match vMAJOR.MINOR.PATCH: $VERSION" >&2
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$VERSION"; then
            echo "Tag already exists: $VERSION" >&2
            exit 1
          fi

      - name: Resolve release target commit
        id: release-target
        run: |
          release_target_commit="$(git rev-parse HEAD)"
          echo "release_target_commit=$release_target_commit" >> "$GITHUB_OUTPUT"
          echo "Release target commit: $release_target_commit"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile validator tools
        run: python -m compileall tools

      - name: Validate Biosiglib
        run: python tools/validate_specs.py

      - name: Check whitespace
        run: git diff --check

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TARGET_COMMIT: ${{ steps.release-target.outputs.release_target_commit }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            --target "$RELEASE_TARGET_COMMIT" \
            --title "$VERSION" \
            --notes "Biosiglib $VERSION

          See CHANGELOG.md for details."

      - name: Verify release tag target
        env:
          RELEASE_TARGET_COMMIT: ${{ steps.release-target.outputs.release_target_commit }}
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --force origin "refs/tags/$VERSION:refs/tags/$VERSION"
          tag_commit="$(git rev-list -n 1 "$VERSION")"
          if [[ "$tag_commit" != "$RELEASE_TARGET_COMMIT" ]]; then
            echo "Release tag $VERSION points to $tag_commit, expected $RELEASE_TARGET_COMMIT" >&2
            exit 1
          fi

      - name: Dispatch Biosigmat propagation
        env:
          GH_TOKEN: ${{ secrets.BIOSIGLIB_PROPAGATION_TOKEN }}
          RELEASE_TARGET_COMMIT: ${{ steps.release-target.outputs.release_target_commit }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "BIOSIGLIB_PROPAGATION_TOKEN is required to dispatch Biosigmat propagation" >&2
            exit 1
          fi
          python - <<'PY' > dispatch-payload.json
          import json
          import os
          import sys

          json.dump(
              {
                  "event_type": "biosiglib-release",
                  "client_payload": {
                      "release": os.environ["VERSION"],
                      "commit": os.environ["RELEASE_TARGET_COMMIT"],
                  },
              },
              sys.stdout,
          )
          PY
          gh api --method POST /repos/BSICoS/biosigmat/dispatches --input dispatch-payload.json

      - name: Dispatch Biosigpy propagation
        env:
          GH_TOKEN: ${{ secrets.BIOSIGPY_PROPAGATION_TOKEN }}
          RELEASE_TARGET_COMMIT: ${{ steps.release-target.outputs.release_target_commit }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "BIOSIGPY_PROPAGATION_TOKEN is required to dispatch Biosigpy propagation" >&2
            exit 1
          fi
          python - <<'PY' > dispatch-payload.json
          import json
          import os
          import sys

          json.dump(
              {
                  "event_type": "biosiglib-release",
                  "client_payload": {
                      "release": os.environ["VERSION"],
                      "commit": os.environ["RELEASE_TARGET_COMMIT"],
                  },
              },
              sys.stdout,
          )
          PY
          gh api --method POST /repos/BSICoS/biosigpy/dispatches --input dispatch-payload.json
